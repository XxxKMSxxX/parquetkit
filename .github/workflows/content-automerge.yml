name: Content auto-merge

# PRs that only touch content/** are auto-merged once the full CI passes.
# PRs that touch even one code file are excluded (regular review).

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check changed files are content-only
        id: scope
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          CHANGED=$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)
          echo "$CHANGED"
          if [ -z "$CHANGED" ]; then
            echo "content_only=false" >> "$GITHUB_OUTPUT"
          elif echo "$CHANGED" | grep -qv '^content/'; then
            echo "content_only=false" >> "$GITHUB_OUTPUT"
          else
            echo "content_only=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Enable auto-merge (waits for required checks)
        if: steps.scope.outputs.content_only == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge --auto --squash "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}"
