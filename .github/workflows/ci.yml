name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test:unit

      # e2e (?duckdb=self) reads from out/duckdb/, so copy it before the build
      - name: Copy DuckDB assets for self-hosted tests
        run: node scripts/copy-duckdb-assets.mjs

      - name: Build (static export)
        run: pnpm build

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Browser tests (engine on real Chromium)
        run: pnpm test:browser

      - name: E2E tests
        run: pnpm exec playwright test --project=chromium

      - name: Internal link check
        run: pnpm check:links
